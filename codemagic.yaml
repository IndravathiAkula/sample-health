workflows:
  android-workflow:
    name: Android Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > "$CM_BUILD_DIR/ivf_care/android/local.properties"
      - name: Get Flutter packages
        working_directory: $CM_BUILD_DIR/ivf_care
        script: |
          $FLUTTER_ROOT/bin/dart --version
          flutter pub cache repair
          flutter pub get
      - name: Flutter analyze
        working_directory: $CM_BUILD_DIR/ivf_care
        script: flutter analyze
      - name: Flutter unit tests
        working_directory: $CM_BUILD_DIR/ivf_care
        script: flutter test
        ignore_failure: true
      - name: Build AAB with Flutter
        working_directory: $CM_BUILD_DIR/ivf_care
        script: flutter build appbundle --release
    artifacts:
      - $CM_BUILD_DIR/ivf_care/build/**/outputs/**/*.aab
      - $CM_BUILD_DIR/ivf_care/build/**/outputs/**/mapping.txt
      - $CM_BUILD_DIR/ivf_care/flutter_drive.log

  ios-workflow:
    name: iOS Workflow (Unsigned)
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        working_directory: $CM_BUILD_DIR/ivf_care
        script: |
          $FLUTTER_ROOT/bin/dart --version
          flutter pub cache repair
          flutter pub get

      - name: Flutter analyze (warnings won't fail build)
        working_directory: $CM_BUILD_DIR/ivf_care
        script: flutter analyze || true

      - name: Build iOS App (unsigned)
        working_directory: $CM_BUILD_DIR/ivf_care
        script: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        working_directory: $CM_BUILD_DIR/ivf_care
        script: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r Runner.ipa Payload

    artifacts:
      - $CM_BUILD_DIR/ivf_care/build/ios/ipa/*.ipa


