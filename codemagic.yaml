workflows:
  ios-workflow:
    name: iOS Workflow (Unsigned)
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        working_directory: sample-health/ivf_care
        script: |
          flutter pub cache repair
          flutter pub get
      - name: Flutter analyze
        working_directory: sample-health/ivf_care
        script: flutter analyze
        ignore_failure: true
      - name: Build iOS IPA (unsigned)
        working_directory: sample-health/ivf_care
        script: flutter build ipa --release --no-codesign
    artifacts:
      - sample-health/ivf_care/build/ios/ipa/*.ipa
      - sample-health/ivf_care/flutter_drive.log
