workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        working_directory: sample-health/ivf_care
        script: flutter pub get

      - name: Build iOS archive (unsigned)
        working_directory: sample-health/ivf_care
        script: |
          flutter build ipa --release --no-codesign

    artifacts:
      - sample-health/ivf_care/build/ios/ipa/*.ipa
      - sample-health/ivf_care/flutter_drive.log
